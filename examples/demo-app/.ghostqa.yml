app:
  name: ghostqa-demo-app
  build: "pnpm run build"
  start: "pnpm run dev"
  url: "http://localhost:3000"

ai:
  provider: cli
  cli:
    command: claude
  max_budget_usd: 2

explorer:
  max_steps: 20
  max_duration: 180000

constraints:
  no_payment: true
  allowed_domains:
    - localhost
    - "127.0.0.1"
